<html lang="en">
    <head>
        <title>VIBRANT</title>
        <meta content="text/html;charset=utf-8" http-equiv="Content-Type" />
        <style>
            * {
                padding: 0;
                margin: 0;
            }

            canvas {
                width: 100vw;
                height: 100vh;
                -webkit-touch-callout: none;
                -webkit-user-select: none;
                -khtml-user-select: none;
                -moz-user-select: none;
                -ms-user-select: none;
                user-select: none;
                outline: none;
                -webkit-tap-highlight-color: rgba(
                    255,
                    255,
                    255,
                    0
                ); /* mobile webkit */
            }
        </style>
    </head>
    <body>
        <canvas id="canvas"></canvas>
        <script type="module">
            import init from "./pkg/vibrant_app.js";
            init();
        </script>
